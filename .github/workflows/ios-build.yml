name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Flutter app directory
        shell: bash
        run: |
          if [ -f pubspec.yaml ] && [ -d ios ]; then
            echo "APP_DIR=." >> "$GITHUB_ENV"
          elif [ -f suryaprakash/pubspec.yaml ] && [ -d suryaprakash/ios ]; then
            echo "APP_DIR=suryaprakash" >> "$GITHUB_ENV"
          else
            echo "Flutter app directory not found." >&2
            ls -la
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Flutter doctor
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter doctor -v || true

      - name: Disable code signing for CI
        shell: bash
        run: |
          cd "$APP_DIR"
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Blank out code-sign identity everywhere
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' "$PBXPROJ"
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' "$PBXPROJ"
          # Remove automatic signing style
          sed -i '' '/CODE_SIGN_STYLE/d' "$PBXPROJ"
          # Inject CODE_SIGNING_REQUIRED=NO and CODE_SIGNING_ALLOWED=NO into every buildSettings block
          perl -i -0pe 's/(buildSettings\s*=\s*\{)/$1\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"
          echo "Code signing disabled in $PBXPROJ"

      - name: Build iOS App (No Sign)
        shell: bash
        run: |
          cd "$APP_DIR"
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        shell: bash
        run: |
          cd "$APP_DIR"
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          /usr/bin/zip -r -y Runner-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: |
            build/ios/ipa/Runner-unsigned.ipa
            suryaprakash/build/ios/ipa/Runner-unsigned.ipa
          if-no-files-found: error

      - name: Upload iOS app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app
          path: |
            build/ios/iphoneos/Runner.app
            suryaprakash/build/ios/iphoneos/Runner.app
          if-no-files-found: warn
