name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Flutter app directory
        shell: bash
        run: |
          if [ -f pubspec.yaml ] && [ -d android ]; then
            echo "APP_DIR=." >> "$GITHUB_ENV"
          elif [ -f suryaprakash/pubspec.yaml ] && [ -d suryaprakash/android ]; then
            echo "APP_DIR=suryaprakash" >> "$GITHUB_ENV"
          else
            echo "Flutter app directory not found." >&2
            ls -la
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew
        working-directory: ${{ env.APP_DIR }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ env.APP_DIR }}

      - name: Flutter doctor
        run: flutter doctor -v
        working-directory: ${{ env.APP_DIR }}

      - name: Build APK
        run: flutter build apk --release
        working-directory: ${{ env.APP_DIR }}

      - name: Build AppBundle
        run: flutter build appbundle --release
        working-directory: ${{ env.APP_DIR }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AppBundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-bundle
          path: ${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
